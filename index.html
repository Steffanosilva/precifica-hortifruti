<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Precifica - Sistema Hortifruti</title>
	<link rel="shortcut icon" href="/assets/apple.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-container">
        <!-- Cabeçalho -->
        <div class="header">
            <div class="header-left">
                <div class="logo-icon">
                    <i class="fas fa-calculator"></i>
                </div>
                <h1>
                    Precifica
                    <span class="badge">v2.3</span>
                </h1>
            </div>
            <div class="margin-control">
                <label for="marginMaster"><i class="fas fa-percent"></i> Margem mestra</label>
                <input type="number" id="marginMaster" value="70" step="0.1" min="0" />
                <span>%</span>
            </div>
        </div>

        <!-- Lista de produtos -->
        <div class="product-grid" id="productGrid">
            <!-- O cabeçalho da lista será inserido via JS para manter sincronia -->
        </div>

        <!-- Rodapé com ações -->
        <div class="footer-actions">
            <button class="add-product-btn" id="showAddFormBtn">
                <i class="fas fa-plus-circle"></i> Adicionar produto
            </button>

            <div class="add-product-form hidden" id="addProductForm">
                <input type="text" id="newProductName" placeholder="Nome do produto" />
                <input type="number" id="newProductWeight" placeholder="Peso" step="0.1" min="0.1" />
                <select id="newProductUnit">
                    <option value="kg">kg</option>
                    <option value="un">un</option>
                </select>
                <button class="confirm-add" id="confirmAddBtn">
                    <i class="fas fa-check"></i> Adicionar
                </button>
                <button class="cancel-add" id="cancelAddBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div class="footer-note">
            <i class="fas fa-arrow-right"></i>
            Preço final = (preço / peso) × (1 + margem) · arredondado para centavo terminado em 9
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
